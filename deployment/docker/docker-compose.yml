version: '3.8'

services:
  rbs:
    build:
      context: ../..
      dockerfile: deployment/docker/dockerfile
    image: globaltrustauthority-rbs/rbs:latest
    container_name: rbs
    ports:
      - "8080:8080"
    volumes:
      - ../../rbs/conf:/etc/rbs:ro
      - rbs-data:/var/lib/rbs
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - rbs-network

volumes:
  rbs-data:

networks:
  rbs-network:
    driver: bridge
