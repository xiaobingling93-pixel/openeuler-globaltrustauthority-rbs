# Compose V2 (`docker compose`) uses BuildKit for service `build` when the Engine supports it.
# On older setups: export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1 before `docker compose ... up --build`.

version: '3.8'

services:
  rbs:
    build:
      context: ../..
      dockerfile: deployment/docker/dockerfile
    image: globaltrustauthority-rbs/rbs:latest
    container_name: rbs
    ports:
      - "8080:8080"
    volumes:
      # Compose-specific config (listen 0.0.0.0:8080) + schema bootstrap SQL from the repo.
      - ./rbs.compose.yaml:/etc/rbs/rbs.yaml:ro
      - ../../rbs/conf/sqlite_rbs.sql:/etc/rbs/sqlite_rbs.sql:ro
      - rbs-data:/var/lib/rbs
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - rbs-network

volumes:
  rbs-data:

networks:
  rbs-network:
    driver: bridge
