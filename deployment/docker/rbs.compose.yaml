# RBS runtime config for Docker Compose (local smoke / dev).
# Binds on all interfaces on port 8080 so host port mapping works.
# Logs to stderr. SQLite DB on the compose volume (/var/lib/rbs in the container).

rest:
  listen_addr: "0.0.0.0:8080"

logging:
  level: info
  format: text

storage:
  db_type: sqlite
  max_connections: 10
  timeout: 30
  url: "sqlite:///var/lib/rbs/rbs.db"
  sql_file_path: "/etc/rbs/sqlite_rbs.sql"
