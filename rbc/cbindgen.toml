language = "C"
header = "/* rbc.h — RBC C API. Auto-generated by cbindgen. DO NOT EDIT. */"
include_guard = "RBC_H"
cpp_compat = true
pragma_once = false
style = "type"
usize_is_size_t = true
sys_includes = ["stdint.h", "stddef.h"]

[parse]
parse_deps = false

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"