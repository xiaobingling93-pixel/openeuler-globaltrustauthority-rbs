openapi: 3.1.0
info:
  title: RBS REST API
  description: Resource Broker Service (RBS) HTTP API.
  contact:
    name: RBS open-source community
    url: https://gitcode.com/openeuler/globaltrustauthority-rbs
  license:
    name: Mulan Permissive Software License, Version 2
    url: http://license.coscl.org.cn/MulanPSL2
  version: 0.1.0
servers:
- url: http://localhost:6666
  description: Default local development (see `rbs.yaml` `rest.listen_addr`)
paths:
  /rbs/version:
    get:
      tags:
      - System
      summary: Get service name, API version, and build metadata
      operationId: rbsVersion
      responses:
        '200':
          description: 'Version payload: service name, API contract version, and build metadata (JSON).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RbsVersion'
      security:
      - {}
components:
  schemas:
    BuildMetadata:
      type: object
      description: Build-time identity for the running binary.
      required:
      - version
      - git_hash
      - build_date
      properties:
        version:
          type: string
          description: Cargo package / release version (semver).
          example: 0.1.0
        git_hash:
          type: string
          description: Git commit hash at build time (hex), or empty when not embedded at build.
          example: 0123456789abcdef0123456789abcdef
        build_date:
          type: string
          description: Build timestamp (UTC), typically RFC 3339, or empty when not embedded at build.
          example: 2026-04-20T00:00:00Z
    ErrorBody:
      type: object
      description: Error payload for HTTP error responses (e.g. 500).
      required:
      - error
      properties:
        error:
          type: string
          description: |-
            Error string for the caller: may be a stable code, a short machine-oriented label,
            or a concise human-readable message. Must not include stack traces or secrets.
    RbsVersion:
      type: object
      description: JSON emitted by `GET /rbs/version` (`service_name`, `api_version`, structured `build`).
      required:
      - service_name
      - api_version
      - build
      properties:
        service_name:
          type: string
          description: Logical service display name.
          example: globaltrustauthority-rbs
        api_version:
          type: string
          description: Published API contract version string.
          example: '0'
        build:
          $ref: '#/components/schemas/BuildMetadata'
          description: Build metadata (`version`, `git_hash`, `build_date`) for this binary; same shape as in the exported `OpenAPI` schema.
tags:
- name: System
  description: '`RbsCore::system` — service identity and API/build version via `GET /rbs/version` (system metadata). Does not require authentication.'
