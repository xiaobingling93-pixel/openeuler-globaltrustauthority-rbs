openapi: 3.1.0
info:
  title: RBS REST API
  description: Resource Broker Service (RBS) HTTP API.
  contact:
    name: RBS open-source community
    url: https://gitcode.com/openeuler/globaltrustauthority-rbs
  license:
    name: Mulan Permissive Software License, Version 2
    url: http://license.coscl.org.cn/MulanPSL2
  version: 0.1.0
servers:
- url: http://localhost:6666
  description: Default local development (see `rbs.yaml` `rest.listen_addr`)
paths:
  /rbs/version:
    get:
      tags:
      - System
      summary: Get service name, API version, and build metadata
      operationId: rbsVersion
      responses:
        '200':
          description: 'Version payload: service name, API contract version, and build metadata (JSON).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RbsVersion'
      security:
      - {}
components:
  schemas:
    BuildMetadata:
      type: object
      description: Build metadata for version information.
      required:
      - version
      - git_hash
      - build_date
      properties:
        version:
          type: string
          description: Package version (e.g., "0.1.0").
        git_hash:
          type: string
          description: Git commit hash.
        build_date:
          type: string
          description: Build timestamp.
    ErrorBody:
      type: object
      description: |-
        Error body returned for all error responses.

        The `error` field may be a stable code (RBS-xxx), a short machine-oriented label,
        or a concise human-readable message. Must not include stack traces or secrets.
      required:
      - error
      properties:
        error:
          type: string
          description: Error string for the caller.
    RbsVersion:
      type: object
      description: Response for GET /rbs/version.
      required:
      - service_name
      - api_version
      - build
      properties:
        service_name:
          type: string
          description: Logical service name (e.g. rbs).
        api_version:
          type: string
          description: Published API / contract version string.
        build:
          $ref: '#/components/schemas/BuildMetadata'
          description: Build or git metadata.
tags:
- name: System
  description: '`RbsCore::system` — service identity and API/build version via `GET /rbs/version` (system metadata). Does not require authentication.'
